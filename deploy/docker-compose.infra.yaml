include:
  - path: docker-compose.authentik.yaml
services:
  # --- Reverse Proxy ---
  gateway-ingress:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - zero-dashboard
    depends_on:
      - server
  # --- Message Broker ---
  nats:
    image: nats:2.11.6-alpine
    container_name: nats-core-broker
    networks:
      - zero-dashboard
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring HTTP
    command:
      - "--http_port=8222"
      - "--js"
      - "--sd=/data"
    volumes:
      - nats_persistence:/data
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
      BUSINESS_DB: ${BUSINESS_DB:-reputation_platform}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d/
    networks:
      - zero-dashboard

volumes:
  nats_persistence:
    driver: local
  database:
    driver: local

networks:
  zero-dashboard:
    name: zero-dashboard
    driver: bridge