events { worker_connections 1024; }

http {
    # 1. Основной домен Authentik (интерфейс администратора)
    server {
        listen 80;
        server_name authentik.local zero-dashboard.local; # Добавили zero-dashboard.local сюда

        location / {
            proxy_pass http://server:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Стратегический Дашборд (Перенаправляем в PROXY-OUTPOST)
    server {
        listen 80;
        server_name dash.zero-dashboard.local;

        location / {
            proxy_pass http://authentik_proxy:9000; # Направляем в прокси-аутпост!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Операционный Gateway (Перенаправляем в PROXY-OUTPOST)
    server {
        listen 80;
        server_name api.zero-dashboard.local;

        location / {
            proxy_pass http://authentik_proxy:9000; # Направляем в прокси-аутпост!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}