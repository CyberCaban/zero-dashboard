events { worker_connections 1024; }

http {

    # --- 1. Authentik Admin UI ---
    # Только для администраторов; НЕ смешиваем с app-доменами
    server {
        listen 80;
        server_name authentik.local;

        location / {
            proxy_pass         http://server:9000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket нужен для live-обновлений в UI Authentik
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # --- 2. Стратегический Дашборд ---
    # Трафик идёт через authentik_proxy (outpost).
    # Outpost сам решает: пустить или редиректнуть на flow.
    server {
        listen 80;
        server_name dash.zero-dashboard.local;

        location / {
            proxy_pass         http://authentik_proxy:9000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- 3. Операционный Gateway (API) ---
    server {
        listen 80;
        server_name api.zero-dashboard.local;

        location / {
            proxy_pass         http://authentik_proxy:9000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- 4. Корневой домен (опционально) ---
    # Если нужен редирект с zero-dashboard.local на дашборд:
    server {
        listen 80;
        server_name zero-dashboard.local;
        return 302 http://dash.zero-dashboard.local$request_uri;
    }
}